name: semantic

on:
  workflow_dispatch:
  push:
    branches:
      - main
      
permissions:
  contents: write
  
jobs:
  release:
    name: Release Version
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
